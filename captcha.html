<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Капча Riot</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap");
    body {
      font-family: Roboto, system-ui, sans-serif;
      margin: 0; min-height: 100vh;
      background: #1f2937; color: #f9faf8;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; gap: 18px; padding: 24px;
    }
    h1 { margin: 0; font-size: 22px; }
    p { margin: 0; color: #cbd5e1; max-width: 440px; line-height: 1.5; }
    .h-captcha { min-height: 94px; }
    #status { font-size: 13px; font-family: monospace; padding: 6px 10px; border-radius: 8px; background: #111827; }
    .ok { color: #6ee7b7; } .bad { color: #fca5a5; }
    #out { display: none; flex-direction: column; gap: 12px; width: 100%; max-width: 460px; align-items: center; }
    textarea {
      width: 100%; height: 110px; box-sizing: border-box;
      background: #111827; color: #a7f3d0; border: 1px solid #374151;
      border-radius: 10px; padding: 12px; font-family: monospace; font-size: 12px; resize: none;
    }
    button {
      background: #047857; color: #f9faf8; border: none;
      padding: 12px 22px; border-radius: 10px; font-size: 16px; cursor: pointer;
      transition: background-color .2s ease;
    }
    button:hover { background: #065f46; }
    #err { color: #fca5a5; display: none; }
    #ok { color: #6ee7b7; font-weight: 700; display: none; }
  </style>
</head>
<body>
  <h1>🔐 Реши капчу Riot</h1>
  <p>Нажми «Решить капчу» (и реши задание, если попросит). Затем скопируй появившийся код и пришли его боту.</p>

  <div id="status">инициализация…</div>
  <div id="capwrap"></div>
  <button id="solve" style="display:none">🧩 Решить капчу</button>

  <div id="out">
    <span id="ok">✅ Капча решена! Скопируй код и отправь боту:</span>
    <textarea id="token" readonly></textarea>
    <button id="copy">📋 Скопировать код</button>
  </div>

  <p id="err"></p>

  <script>
    // sitekey и rqdata кладём в #hash (поддержим и ?query на всякий случай).
    var P = (function () {
      var h = new URLSearchParams(location.hash.slice(1));
      var q = new URLSearchParams(location.search.slice(1));
      var g = function (k) { return h.get(k) || q.get(k); };
      return { sitekey: g('sitekey'), rqdata: g('rqdata') };
    })();

    function setStatus(t, good) {
      var s = document.getElementById('status');
      s.textContent = t; s.className = good ? 'ok' : 'bad';
    }
    function showError(m) {
      var e = document.getElementById('err');
      e.textContent = '⚠️ ' + m; e.style.display = 'block';
    }

    // Глобальный колбэк успешного решения.
    window.onSolve = function (token) {
      document.getElementById('token').value = token;
      document.getElementById('ok').style.display = 'block';
      document.getElementById('out').style.display = 'flex';
      document.getElementById('solve').style.display = 'none';
      setStatus('капча решена ✓ (токен привязан к rqdata)', true);
    };
    window.onExpire = function () { showError('Капча истекла — обнови страницу и реши заново.'); };

    var WIDGET_ID = null;

    // Вызовется, когда hCaptcha API готов (?onload=onHcaptchaLoad).
    // КЛЮЧЕВОЙ МОМЕНТ для Riot (hCaptcha Enterprise): rqdata передаётся НЕ в
    // render(), а в execute(id, { rqdata }). Поэтому рендерим НЕВИДИМЫЙ виджет
    // (size:'invisible') и сами запускаем челлендж через execute() с rqdata —
    // тогда токен привязывается к rqdata, и Riot его принимает. Если кликать по
    // обычной галочке, hCaptcha вызывает execute() сам, БЕЗ нашего rqdata —
    // именно из-за этого прошлые версии не работали.
    window.onHcaptchaLoad = function () {
      try {
        WIDGET_ID = hcaptcha.render('capwrap', {
          sitekey: P.sitekey,
          size: 'invisible',
          theme: 'dark',
          callback: 'onSolve',
          'expired-callback': 'onExpire',
          'error-callback': 'onCapError',
        });
        var btn = document.getElementById('solve');
        btn.style.display = 'inline-block';
        btn.onclick = runChallenge;
        setStatus('готово — нажми «Решить капчу» (rqdata ' + P.rqdata.length + ' симв.)', true);
      } catch (e) {
        setStatus('ошибка render: ' + e.message, false);
        showError('Не удалось отрисовать капчу: ' + e.message + '. Обнови страницу.');
      }
    };

    // Запуск enterprise-челленджа с привязкой rqdata.
    function runChallenge() {
      setStatus('запускаю капчу с rqdata…', true);
      try {
        // async:true -> промис с { response: token, key }. Это и есть rqdata-токен.
        var p = hcaptcha.execute(WIDGET_ID, { rqdata: P.rqdata, async: true });
        if (p && typeof p.then === 'function') {
          p.then(function (res) { onSolve(res && res.response ? res.response : res); })
           .catch(function (e) { onCapError(e && e.message ? e.message : String(e)); });
        }
        // если промис не вернулся — токен прилетит в callback onSolve
      } catch (e) {
        onCapError(e && e.message ? e.message : String(e));
      }
    }

    window.onCapError = function (err) {
      setStatus('hCaptcha error: ' + err, false);
      showError('hCaptcha вернул ошибку (' + err + '). Часто это VPN/блокировка — попробуй сменить сеть и обнови страницу.');
    };

    // --- старт: грузим api.js в explicit-режиме, рендерим сами в onHcaptchaLoad ---
    (function start() {
      if (!P.sitekey) { setStatus('НЕТ sitekey в ссылке', false); showError('Открой ссылку от бота целиком (в ней есть #sitekey=...&rqdata=...).'); return; }
      if (!P.rqdata) { setStatus('НЕТ rqdata в ссылке', false); showError('В ссылке нет rqdata — без него Riot капчу не примет. Скопируй ссылку от бота целиком.'); return; }

      // render=explicit — api.js НЕ рендерит сам, ждёт нашего hcaptcha.render() с rqdata.
      var s = document.createElement('script');
      s.src = 'https://js.hcaptcha.com/1/api.js?render=explicit&onload=onHcaptchaLoad';
      s.async = true; s.defer = true;
      s.onerror = function () { setStatus('не загрузился hCaptcha', false); showError('Не удалось загрузить hCaptcha. Проверь интернет/VPN и обнови страницу.'); };
      document.head.appendChild(s);
      setStatus('загружаю hCaptcha…', true);
    })();

    document.getElementById('copy').onclick = function () {
      var ta = document.getElementById('token');
      ta.select();
      var done = function () {
        var b = document.getElementById('copy');
        b.textContent = '✅ Скопировано';
        setTimeout(function () { b.textContent = '📋 Скопировать код'; }, 1500);
      };
      if (navigator.clipboard) {
        navigator.clipboard.writeText(ta.value).then(done, function () { document.execCommand('copy'); done(); });
      } else { document.execCommand('copy'); done(); }
    };
  </script>
</body>
</html>
